<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark text-center text-dark fw-bold">

    <div class="container-lg pt-4">
        <h3 class="text-white mb-4">Bootstrap Grid</h3>


        <div class="row g-1 mb-2">
            <div class="col-12 col-md-6 col-lg-1 bg-primary text-white py-2">1 (LG)</div>
            <div class="col-12 col-md-6 col-lg-11 bg-danger py-2">11 (LG)</div>
        </div>


        <div class="row g-1 mb-2">
            <div class="col-12 col-md-6 col-lg-8 bg-warning py-2">8 (LG) / 6 (MD)</div>
            <div class="col-12 col-md-6 col-lg-4 bg-info py-2">4 (LG) / 6 (MD)</div>
        </div>


        <div class="row g-1 mb-2">
            <div class="col-12 col-md-12 col-lg-6 bg-primary text-white py-2">6 (LG) / 12 (MD)</div>
            <div class="col-12 col-md-12 col-lg-6 bg-info py-2">6 (LG) / 12 (MD)</div>
        </div>


        <div class="row g-1 mb-2">
            <div class="col-12 col-md-12 col-lg-4 bg-secondary text-white py-2">4</div>
            <div class="col-12 col-md-6 col-lg-4 bg-primary text-white py-2">4</div>
            <div class="col-12 col-md-6 col-lg-4 bg-info py-2">4</div>
        </div>


        <div class="row g-1 mb-2">
            <div class="col-12 col-md-4 col-lg-2 bg-primary text-white py-2">2</div>
            <div class="col-12 col-md-4 col-lg-2 bg-secondary text-white py-2">2</div>
            <div class="col-12 col-md-4 col-lg-2 bg-info py-2">2</div>
            <div class="col-12 col-md-4 col-lg-2 bg-danger py-2">2</div>
            <div class="col-12 col-md-4 col-lg-2 bg-warning py-2">2</div>
            <div class="col-12 col-md-4 col-lg-2 bg-success text-white py-2">2</div>
        </div>


        <div class="row g-1 mb-2">
            <div class="col-12 col-md-4 col-lg-1 bg-primary text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-secondary text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-info py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-success text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-warning py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-danger py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-primary text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-secondary text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-info py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-success text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-secondary text-white py-2">1</div>
            <div class="col-12 col-md-4 col-lg-1 bg-info py-2">1</div>
        </div>
    </div>

</body>

</html>
