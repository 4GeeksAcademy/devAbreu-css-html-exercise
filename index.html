<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .field {
            margin-bottom: 20px;
            font-family: sans-serif;
        }

        input {
            display: block;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        /* 1. Ocultar mensaje por defecto */
        .error-msg {
            display: none;
            color: #d93025;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* 2. Estilo cuando el usuario ya interactuó y es inválido */
        /* :user-invalid es moderno y genial: solo se activa tras perder el foco o intentar enviar */
        input:user-invalid {
            border-color: #d93025;
            background-color: #fff4f4;
        }

        input:user-invalid+.error-msg {
            display: block;
        }

        /* 3. Opcional: Feedback visual de éxito */
        input:user-valid {
            border-color: #1e8e3e;
        }
    </style>
</head>

    <form novalidate>
        <div class="field">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" required placeholder=" ">
            <!-- El placeholder con un espacio " " es un truco para que :placeholder-shown funcione bien -->

            <span class="error-msg">Formato de correo inválido o campo vacío.</span>
        </div>

        <button type="submit">Enviar</button>
    </form>


    <div class="mb-3">

    <div class="mb-3">
